# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html
## Source: https://github.com/hexojs/hexo/

# Site
title: BANG
subtitle: ''
description: ''
keywords:
author: FF0522
language: zh-tw
timezone: Asia/Taipei

# URL
## Set your site url here. For example, if you use GitHub Page, set url as 'https://username.github.io/project'
url: https://FF0522.github.io
root: /
permalink: :year/:month/:day/:title/
permalink_defaults:
pretty_urls:
  trailing_index: true # Set to false to remove trailing 'index.html' from permalinks
  trailing_html: true # Set to false to remove trailing '.html' from permalinks

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md # File name of new posts
default_layout: post
titlecase: false # Transform title into titlecase
external_link:
  enable: true # Open external links in new tab
  field: site # Apply to the whole site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: true
prismjs:
  preprocess: true
  line_number: true
  tab_replace: ''

# Home page setting
# path: Root path for your blogs index page. (default = '')
# per_page: Posts displayed per page. (0 = disable pagination)
# order_by: Posts order. (Order by date descending by default)
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Metadata elements
## https://developer.mozilla.org/en-US/docs/Web/HTML/Element/meta
meta_generator: true

# Date / Time format
## Hexo uses Moment.js to parse and display date
## You can customize the date format as defined in
## http://momentjs.com/docs/#/displaying/format/
date_format: YYYY-MM-DD
time_format: HH:mm:ss
## updated_option supports 'mtime', 'date', 'empty'
updated_option: 'mtime'

# Pagination
## Set per_page to 0 to disable pagination
per_page: 10
pagination_dir: page

# Include / Exclude file(s)
## include:/exclude: options only apply to the 'source/' folder
include:
exclude:
ignore:

# Extensions
## Plugins: https://hexo.io/plugins/
## Themes: https://hexo.io/themes/
theme: arknights

theme_config:
  lang: zh-tw
  favicon:
    type: "image/x-icon"
    href: "/favicon.ico"
  canvas_dust: true
  color: dark
  build_time: false
  background_image:
    dark: https://ak.hypergryph.com/assets/index/images/ak/pc/bk.jpg
    light: /img/bk.jpg
  menu:
    Home: ""
    About: about/
    Archives: archives/
  aside:
    in_left: false
    logo: https://ak.hypergryph.com/assets/index/images/ak/pc/faction/1.png
    logo_margin: 0
    logo_border_radius: 0
    dr: /
    icp:
    copyright:
  social:
    GitHub: https://github.com/FF0522 || fab fa-github
    E-Mail: mailto:fengwang0715@gmail.com || fa fa-envelope
  post:
    date: true
    updated: true
    excerpt: true
    count: true
    time: true
    code_fold: 15
  toc:
    list_number: true
    max_depth: 6
    min_depth: 1
  archives:
    categories_count: true
    tags_count: true
  search:
    enable: true
    content: true
    preload: false
    field: post
    format: striptags
  bgm:
    enable: false
  vercount:
    enable: true
    sitePV: true
    siteUV: true
    pagePV: true
  mermaid:
    enable: true
    version: "11.12.2"
  pjax:
    enable: true


# Deployment
## Docs: https://hexo.io/docs/one-command-deployment
deploy:
  type: git
  repo: https://github.com/FF0522/FF0522.github.io.git
  branch: main